<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Door Status — Live Monitor</title>
      <meta name="description" content="Live open/closed monitoring for the Mathe Café door." />

      <!-- Fonts: serif body (journal text) + monospace for data/tables -->
      <link
         rel="stylesheet"
         type="text/css"
         href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css"
      />

      <!-- Styles: theme.css owns the palette (as CSS vars); dashboard.css the structure -->
      <link rel="stylesheet" href="css/theme.css" />
      <link rel="stylesheet" href="css/dashboard.css" />

      <!-- Tailwind Play CDN. Colour names map to the SAME CSS vars defined in
       theme.css, so the palette has a single source of truth. -->
      <script src="https://cdn.tailwindcss.com"></script>
      <script>
         tailwind.config = {
            theme: {
               extend: {
                  colors: {
                     bg: "var(--paper-bg)",
                     bg1: "var(--paper-bg1)",
                     panel: "var(--paper)",
                     panel2: "var(--paper-2)",
                     line: "var(--line)",
                     linesoft: "var(--line-soft)",
                     ink: "var(--ink)",
                     inkdim: "var(--ink-dim)",
                     inkfaint: "var(--ink-faint)",
                     grid: "var(--grid)",
                     open: "var(--open)",
                     opendim: "var(--open-dim)",
                     closed: "var(--closed)",
                     closeddim: "var(--closed-dim)",
                     unknown: "var(--unknown)",
                     unknowndim: "var(--unknown-dim)",
                  },
                  fontFamily: {
                     mono: ['"Computer Modern Typewriter"', "ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
                     serif: ['"Computer Modern Serif"', "Georgia", '"Times New Roman"', "serif"],
                  },
                  borderRadius: { panel: "var(--radius-panel)" },
                  screens: {
                     sm: "750px",
                  },
                  fontSize: {
                     xs: ["0.9rem", { lineHeight: "1.3rem" }],
                     sm: ["1.025rem", { lineHeight: "1.45rem" }],
                     base: ["1.15rem", { lineHeight: "1.75rem" }],
                     lg: ["1.275rem", { lineHeight: "1.9rem" }],
                     xl: ["1.4rem", { lineHeight: "2rem" }],
                     "2xl": ["1.7rem", { lineHeight: "2.1rem" }],
                     "3xl": ["2.05rem", { lineHeight: "2.45rem" }],
                  },
               },
            },
         };
      </script>

      <!-- Third-party libs (UMD globals consumed by the modules) -->
      <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

      <!-- Application (ES modules). dashboard.js registers all <door-*> elements. -->
      <script type="module" src="js/dashboard.js"></script>
   </head>

   <body class="font-serif text-ink text-[14px] leading-relaxed">
      <div class="paper-grid"></div>
      <div class="paper-grain"></div>

      <div class="relative z-10 mx-auto max-w-[1240px] px-[18px] pt-[18px] pb-16">
         <!-- ── Masthead (journal nameplate) ── -->
         <header class="mb-[18px] border-y-[3px] border-double border-ink py-3">
            <div class="flex flex-wrap justify-center items-center gap-4 sm:justify-between">
               <div class="flex items-center gap-3">
                  <img style="height: 3.5em" src="marken.png" class="hidden sm:inline" />
                  <div>
                     <h1
                        class="font-serif font-bold text-[24px] tracking-tight leading-none m-0 text-center sm:text-left"
                     >
                        Mathe Café Door Status
                     </h1>
                     <div class="label mt-1 text-center sm:text-left">
                        An instrument record of the mathe cafe door sensor
                     </div>
                  </div>
               </div>
               <div>
                  <p id="date-heading" class="font-serif font-bold text-center sm:text-right">
                     Wednesday, 27. September 2026
                  </p>
                  <p id="semester-heading" class="label mt-1 text-center sm:text-right">Summer Semester 2026</p>
               </div>
            </div>
         </header>

         <!-- ── Hero: live status + rolling open-rate ── -->
         <section class="grid gap-[14px] lg:grid-cols-[minmax(280px,1fr)_2fr] mb-[14px]">
            <door-status></door-status>
            <door-timeline fig="1" heading="Timeline of Today's Opening Hours" note="green = open"></door-timeline>
         </section>

         <!-- ── 30-day history ── -->
         <section class="grid gap-[14px] lg:grid-cols-2 mb-[14px]">
            <door-hours fig="2" heading="Hours Open per Day (Last 30 d)"></door-hours>
            <door-band fig="3" heading="First Open → Last Close (Last 30 days)"></door-band>
         </section>

         <!-- ── Heatmap (full width) ── -->
         <door-heatmap
            class="mb-[14px]"
            fig="4"
            heading="Opening Heatmap Hour × Weekday (Current Period)"
         ></door-heatmap>

         <!-- ── Period profile by weekday + hour ── -->
         <section class="grid gap-[14px] lg:grid-cols-2 mb-[14px]">
            <door-weekday fig="5" heading="Open by Weekday (Current Period)"></door-weekday>
            <door-hour fig="6" heading="Open by Hour of Day (Current Period)"></door-hour>
         </section>

         <!-- ── Interactive: open % by hour, per weekday ── -->
         <door-hour-weekday
            class="mb-[14px]"
            fig="7"
            heading="Open by Hour per Weekday (Current Period)"
            note="click a weekday to toggle · hover to compare"
         ></door-hour-weekday>

         <!-- ── Event log ── -->
         <door-log fig="8" heading="Event log" note="most recent first"></door-log>

         <footer
            class="mt-6 border-t border-line pt-3 text-[10.5px] text-inkfaint flex flex-wrap justify-between gap-2 font-serif italic"
         >
            <span>Comparisons scoped to the active semester / break — never across period boundaries.</span>
            <span id="genStamp">—</span>
         </footer>
      </div>
   </body>
</html>
